<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digelta — Business Card</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #ECEAF2;
  font-family: 'Jost', sans-serif;
}

.card {
  width: 440px;
  background: #fff;
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.06);
  animation: rise 0.7s cubic-bezier(0.16,1,0.3,1) both;
}

@keyframes rise {
  from { opacity:0; transform:translateY(24px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── TOP BAND ── */
.top-band {
  background: #1A1726;
  padding: 38px 40px 32px;
  position: relative;
  overflow: hidden;
}

/* Subtle geometric accent */
.top-band::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 160px; height: 160px;
  border: 1.5px solid rgba(167,139,218,0.18);
  border-radius: 50%;
}
.top-band::after {
  content: '';
  position: absolute;
  top: -20px; right: -20px;
  width: 100px; height: 100px;
  border: 1.5px solid rgba(167,139,218,0.1);
  border-radius: 50%;
}

.header-inner {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}

.logo-lockup {
  display: flex;
  align-items: center;
  gap: 14px;
}
.logo-lockup img {
  width: 46px; height: 46px;
  object-fit: contain;
  opacity: 0.95;
}
.brand-text .name {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  font-weight: 500;
  color: #fff;
  letter-spacing: 0.01em;
  line-height: 1;
}
.brand-text .tagline {
  font-size: 9.5px;
  font-weight: 300;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: rgba(167,139,218,0.7);
  margin-top: 5px;
}

.title-block {
  text-align: right;
}
.title-block .role {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(167,139,218,0.55);
}
.title-block .dept {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  font-weight: 400;
  color: rgba(255,255,255,0.7);
  margin-top: 4px;
  font-style: italic;
}

/* ── ACCENT LINE ── */
.accent-line {
  height: 2px;
  background: linear-gradient(90deg, #7C6AE8, #F08EC0, #6DCCE8);
}

/* ── NAME SECTION ── */
.name-section {
  background: #fff;
  padding: 32px 40px 24px;
  border-bottom: 1px solid #F0EDF8;
}
.full-name {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  font-weight: 400;
  color: #1A1726;
  line-height: 1.1;
  letter-spacing: -0.01em;
}
.full-name span {
  color: #7C6AE8;
}
.designation {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
}
.designation-text {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #7A7490;
}
.designation-dot {
  width: 3px; height: 3px;
  border-radius: 50%;
  background: #F08EC0;
}

/* ── CONTACT SECTION ── */
.contacts {
  padding: 24px 40px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px 24px;
}

.contact-item {
  display: flex;
  flex-direction: column;
  gap: 3px;
  text-decoration: none;
}
.contact-item:hover .cval { color: #7C6AE8; }

.clabel {
  font-size: 8.5px;
  font-weight: 500;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: #C4BEDD;
}
.cval {
  font-size: 13.5px;
  font-weight: 400;
  color: #2E2A42;
  transition: color 0.18s;
  white-space: nowrap;
}

/* ── BOTTOM STRIP ── */
.bottom-strip {
  background: #F7F5FF;
  border-top: 1px solid #EDE9F8;
  padding: 18px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.services {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.svc {
  font-size: 9.5px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #7A7490;
  padding: 4px 10px;
  border: 1px solid #DDD8F0;
  border-radius: 2px;
}

.save-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  background: #1A1726;
  color: #fff;
  font-family: 'Jost', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 10px 18px;
  border-radius: 2px;
  border: none;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.18s;
}
.save-btn:hover { background: #2E2A42; }
.save-btn svg { width: 13px; height: 13px; opacity: 0.7; }

/* ── BOTTOM RULE ── */
.bottom-rule {
  height: 3px;
  background: linear-gradient(90deg, #7C6AE8 0%, #F08EC0 50%, #6DCCE8 100%);
}

@media (max-width: 480px) {
  .card { width: 94vw; }
  .contacts { grid-template-columns: 1fr; }
  .full-name { font-size: 28px; }
  .top-band { padding: 28px 28px 24px; }
  .name-section, .contacts, .bottom-strip { padding-left: 28px; padding-right: 28px; }
}
</style>
</head>
